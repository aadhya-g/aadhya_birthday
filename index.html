```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Invitation</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
overflow:hidden;
color:white;
}

/* subtle floating sparkles */

.sparkle{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.7;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* invitation card */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.2);
padding:40px;
border-radius:18px;
width:380px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
transition:0.4s;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

/* heading */

h1{
font-size:32px;
margin-bottom:10px;
letter-spacing:1px;
}

/* divider line */

.line{
width:60px;
height:3px;
background:#ff7eb3;
margin:15px auto;
border-radius:5px;
}

/* details */

.details{
margin:20px 0;
font-size:17px;
line-height:1.8;
}

/* button */

button{
margin-top:20px;
padding:12px 28px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#ff7eb3,#ff758c);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 10px 25px rgba(255,120,150,0.5);
}

.footer{
margin-top:20px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<!-- sparkles -->
<script>
for(let i=0;i<40;i++){
let s=document.createElement("div")
s.className="sparkle"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
s.style.animationDelay=Math.random()*4+"s"
document.body.appendChild(s)
}
</script>

<div class="card">

<h1>Birthday Evening</h1>

<div class="line"></div>

<p>I'd love for you to join me for a small celebration.</p>

<div class="details">
📍 <b>Spicy Bites</b><br>
🕕 <b>6:00 PM</b>
</div>

<button onclick="rsvp()">RSVP</button>

<div class="footer">
Good food, good friends, and a good evening.
</div>

</div>

<script>

function rsvp(){
alert("Looking forward to seeing you at Spicy Bites!");
}

</script>

</body>
</html>
