<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Party Invitation</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Verdana, sans-serif;
}

/* BACKGROUND */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#ff7eb3,#ff758c,#ffb199,#ff7eb3);
background-size:800% 800%;
animation:bgmove 10s infinite;
overflow:hidden;
}

/* animated gradient */
@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* BALLOONS */

.balloon{
position:absolute;
bottom:-120px;
width:60px;
height:80px;
border-radius:50%;
opacity:.8;
animation:float 9s infinite;
}

.balloon:after{
content:"";
position:absolute;
height:40px;
width:2px;
background:#333;
left:50%;
top:80px;
}

.balloon:nth-child(1){left:10%;background:#ff4d6d;}
.balloon:nth-child(2){left:30%;background:#ffd166;animation-delay:2s;}
.balloon:nth-child(3){left:70%;background:#06d6a0;animation-delay:4s;}
.balloon:nth-child(4){left:85%;background:#4cc9f0;animation-delay:1s;}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

/* CARD */

.card{
background:white;
padding:40px;
width:380px;
border-radius:20px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.3);
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 20px rgba(255,0,100,.3);}
to{box-shadow:0 0 40px rgba(255,0,100,.6);}
}

h1{
color:#ff006e;
margin-bottom:10px;
}

/* DETAILS BOX */

.details{
background:#fff0f6;
padding:15px;
border-radius:12px;
margin:15px 0;
font-size:17px;
}

/* COUNTDOWN */

#countdown{
font-size:20px;
margin:10px 0;
color:#333;
font-weight:bold;
}

/* BUTTON */

button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:16px;
background:linear-gradient(45deg,#ff006e,#ff7eb3);
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.15);
}

/* CONFETTI */

.confetti{
position:fixed;
width:10px;
height:10px;
background:red;
top:0;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

</style>
</head>

<body>

<!-- BALLOONS -->
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<!-- CARD -->
<div class="card">

<h1>🎉 Birthday Party 🎂</h1>

<p>You’re invited to celebrate with me!</p>

<div class="details">
📍 <b>Spicy Bites</b><br>
⏰ <b>6:00 PM</b>
</div>

<div id="countdown"></div>

<button onclick="party()">RSVP 🎈</button>

<p style="margin-top:15px">Food • Friends • Fun ✨</p>

</div>


<script>

/* COUNTDOWN TIMER */

var partyTime = new Date();
partyTime.setHours(18,0,0);

function updateCountdown(){
var now = new Date();
var diff = partyTime - now;

if(diff <= 0){
document.getElementById("countdown").innerHTML = "🎉 The party has started!";
return;
}

var h = Math.floor(diff/1000/60/60);
var m = Math.floor(diff/1000/60)%60;
var s = Math.floor(diff/1000)%60;

document.getElementById("countdown").innerHTML =
"Party starts in: " + h + "h " + m + "m " + s + "s";
}

setInterval(updateCountdown,1000);


/* CONFETTI EFFECT */

function party(){

for(let i=0;i<80;i++){

let confetti = document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";
confetti.style.backgroundColor=
"hsl("+Math.random()*360+"deg,100%,50%)";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),3000);

}

alert("🎉 Yay! See you at Spicy Bites at 6 PM!");
}

</script>

</body>
</html>
