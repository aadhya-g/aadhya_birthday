<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Invitation</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* BACKGROUND */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#ff7eb3,#ff758c,#ffb199,#ffd6ff);
background-size:600% 600%;
animation:bgmove 10s infinite;
overflow:hidden;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* SPARKLES */

.sparkle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white,0 0 20px white;
animation:sparkle 2s infinite;
}

@keyframes sparkle{
0%{transform:scale(0);opacity:0}
50%{transform:scale(1);opacity:1}
100%{transform:scale(0);opacity:0}
}

/* BALLOONS */

.balloon{
position:absolute;
bottom:-120px;
width:60px;
height:80px;
border-radius:50%;
animation:float 10s infinite;
opacity:0.8;
}

.balloon::after{
content:"";
position:absolute;
height:40px;
width:2px;
background:#333;
left:50%;
top:80px;
}

.balloon:nth-child(1){left:10%;background:#ff4d6d;}
.balloon:nth-child(2){left:30%;background:#ffd166;}
.balloon:nth-child(3){left:70%;background:#06d6a0;}
.balloon:nth-child(4){left:85%;background:#4cc9f0;}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

/* CARD */

.card{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
text-align:center;
width:380px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 20px rgba(255,0,100,.4);}
to{box-shadow:0 0 40px rgba(255,0,100,.8);}
}

h1{
color:#ff006e;
margin-bottom:10px;
font-size:32px;
}

/* DETAILS */

.details{
background:#fff0f6;
padding:15px;
border-radius:12px;
margin:15px 0;
font-size:17px;
}

/* BUTTON */

button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:16px;
background:linear-gradient(45deg,#ff006e,#ff7eb3);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.15);
}

/* CONFETTI */

.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

</style>
</head>

<body>

<!-- BALLOONS -->
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<!-- SPARKLES -->
<script>
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDelay=Math.random()*2+"s";
document.body.appendChild(s);
}
</script>

<!-- CARD -->

<div class="card">

<h1>🎉 Birthday Party 🎂</h1>

<p>You are invited to celebrate with me!</p>

<div class="details">
📍 <b>Spicy Bites</b><br>
⏰ <b>6:00 PM</b>
</div>

<button onclick="celebrate()">RSVP ✨</button>

<p style="margin-top:15px">Food • Friends • Fun 🎈</p>

</div>

<script>

function celebrate(){

for(let i=0;i<80;i++){

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";
confetti.style.backgroundColor=
"hsl("+Math.random()*360+"deg,100%,50%)";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),3000);

}

alert("🎉 See you at Spicy Bites at 6 PM!");

}

</script>

</body>
</html>
