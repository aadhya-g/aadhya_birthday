```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Party Invite</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

/* BACKGROUND */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(270deg,#ff7eb3,#ff758c,#ffd6ff,#ffb199);
background-size:600% 600%;
animation:bg 10s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CARD */

.card{
background:rgba(255,255,255,.9);
padding:40px;
border-radius:20px;
width:380px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.3);
backdrop-filter:blur(10px);
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 20px rgba(255,0,120,.4);}
to{box-shadow:0 0 40px rgba(255,0,120,.8);}
}

h1{
color:#ff006e;
margin-bottom:10px;
}

/* DETAILS */

.details{
background:#fff0f6;
padding:15px;
border-radius:10px;
margin:15px 0;
}

/* BUTTON */

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff006e,#ff7eb3);
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.2);
}

/* BALLOONS */

.balloon{
position:absolute;
bottom:-120px;
width:60px;
height:80px;
border-radius:50%;
opacity:.8;
animation:float 10s infinite;
}

.balloon:after{
content:"";
position:absolute;
height:40px;
width:2px;
background:#333;
left:50%;
top:80px;
}

.balloon:nth-child(1){background:#ff4d6d;left:10%;}
.balloon:nth-child(2){background:#ffd166;left:30%;animation-delay:2s;}
.balloon:nth-child(3){background:#06d6a0;left:70%;animation-delay:3s;}
.balloon:nth-child(4){background:#4cc9f0;left:90%;animation-delay:1s;}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

/* SPARKLES */

.spark{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white;
animation:blink 2s infinite;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* CONFETTI */

.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

/* CURSOR SPARKLE */

.trail{
position:fixed;
width:6px;
height:6px;
background:white;
border-radius:50%;
pointer-events:none;
animation:fade 1s forwards;
}

@keyframes fade{
to{
opacity:0;
transform:scale(2);
}
}

/* CAKE */

.cake{
font-size:40px;
cursor:pointer;
margin:10px 0;
transition:.3s;
}

.cake:hover{
transform:scale(1.3) rotate(10deg);
}

</style>
</head>

<body>

<!-- BALLOONS -->
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<div class="card">

<h1>🎉 Birthday Party 🎉</h1>

<div class="cake" onclick="cake()">🎂</div>

<p>You are invited to celebrate with me!</p>

<div class="details">
📍 Spicy Bites<br>
⏰ 6:00 PM
</div>

<button onclick="party()">RSVP</button>

<p style="margin-top:15px">Food • Friends • Fun ✨</p>

</div>

<script>

/* SPARKLES */

for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="spark";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

/* CONFETTI */

function party(){

for(let i=0;i<80;i++){

let c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*100+"vw";
c.style.backgroundColor="hsl("+Math.random()*360+",100%,50%)";

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);
}

alert("🎉 See you at Spicy Bites at 6 PM!");
}

/* CAKE CLICK */

function cake(){
alert("Make a wish! 🎂✨");
}

/* CURSOR GLITTER */

document.addEventListener("mousemove",function(e){

let t=document.createElement("div");
t.className="trail";

t.style.left=e.pageX+"px";
t.style.top=e.pageY+"px";

document.body.appendChild(t);

setTimeout(()=>t.remove(),1000);

});

</script>

</body>
</html>
